<!DOCTYPE html>
<html>
<head>

<title>AGIPL Download System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 600px;
    margin: 80px auto;
    background: white;
    padding: 40px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.15);
}

h1 {
    color: #1f4e79;
    margin-bottom: 10px;
}

p {
    color: #555;
    font-size: 17px;
}


.download-btn {

    display: block;
    width: 80%;
    margin: 20px auto;
    padding: 15px;

    font-size: 18px;
    text-decoration: none;

    border-radius: 8px;
    color:white;

}


.excel {

    background:#198754;

}


.pdf {

    background:#dc3545;

}


.download-btn:hover {

    opacity:0.85;

}


.footer {

    margin-top:30px;
    font-size:13px;
    color:#777;

}

</style>


<script>

function loading(msg){

    document.getElementById("status").innerHTML = msg;

}

</script>


</head>


<body>


<div class="container">


<h1>AGIPL Download System</h1>

<p>
Generate Master Table Report
</p>


<a class="download-btn excel"
onclick="loading('Generating Excel File... Please wait')"
href="/download_excel">

⬇ Download Excel

</a>


<a class="download-btn pdf"
onclick="loading('Generating PDF File... Please wait')"
href="/download_pdf">

📄 Download PDF

</a>


<p id="status"></p>


<div class="footer">

AGIPL Digital Reporting System

</div>


</div>


</body>

</html>
