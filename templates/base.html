<!DOCTYPE html>
<html>

<head>

<title>
AGIPL Digital Command Center
</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Segoe UI',Arial,sans-serif;

min-height:100vh;

background:
radial-gradient(circle at 20% 20%,#0077ff55,transparent 30%),
radial-gradient(circle at 80% 80%,#00ffff55,transparent 30%),
linear-gradient(135deg,#061426,#123d68);

color:white;

}


/* HEADER */


.navbar{

height:75px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 50px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(15px);

border-bottom:1px solid rgba(255,255,255,.25);

}



.logo{

display:flex;

align-items:center;

gap:15px;

font-size:25px;

font-weight:bold;

}



.logo-circle{

width:55px;

height:55px;

border-radius:50%;

background:white;

color:#063b78;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}



.menu a{

color:white;

text-decoration:none;

margin-left:25px;

}



.menu a:hover{

color:#00ffff;

}




/* PAGE AREA */


.container{

padding:40px;

text-align:center;

}




.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:20px;

padding:30px;

box-shadow:0 20px 40px #0005;

}



.footer{

text-align:center;

margin-top:40px;

opacity:.7;

font-size:14px;

}


</style>


</head>


<body>



<div class="navbar">


<div class="logo">


<div class="logo-circle">

AG

</div>


AGIPL Digital Portal


</div>




<div class="menu">


<a href="/">Home</a>

<a href="/modules">Modules</a>

<a href="/reports">Reports</a>

<a href="#">Support</a>


</div>



</div>






<div class="container">


{% block content %}

{% endblock %}



</div>





<div class="footer">

AGIPL Digital Transformation Platform

</div>




</body>

</html>
